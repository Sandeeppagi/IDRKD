services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/change-me
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: idrkd
      POSTGRES_PASSWORD: idrkd
      POSTGRES_DB: idrkd
    volumes:
      - ../configs/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idrkd -d idrkd"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: idrkd
      MINIO_ROOT_PASSWORD: change-me-now
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v3.0.1
    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ../configs/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro

  graphify:
    build:
      context: ..
      dockerfile: docker/graphify.Dockerfile
    profiles: ["graphify"]
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ../data/raw:/work/raw:ro
      - ../data/processed/graphify-out:/work/graphify-out
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: change-me
    command:
      - /bin/sh
      - -lc
      - repo="$${GRAPHIFY_SOURCE_DIR:-httpx}" && out="$${GRAPHIFY_OUTPUT_NAME:-$$repo}" && rm -rf "/tmp/$$repo" "/work/graphify-out/$$out" && cp -R "/work/raw/$$repo" "/tmp/$$repo" && graphify update "/tmp/$$repo" --force --no-cluster && python -m idrkd.graph.graphify_importer --graph "/tmp/$$repo/graphify-out/graph.json" --neo4j-uri "$$NEO4J_URI" --neo4j-user "$$NEO4J_USER" --neo4j-password "$$NEO4J_PASSWORD" --tenant-id "$${TENANT_ID:-default}" --repo-id "$${REPO_ID:-$$out}" --source-label "$$out" && mkdir -p /work/graphify-out && cp -R "/tmp/$$repo/graphify-out" "/work/graphify-out/$$out"
